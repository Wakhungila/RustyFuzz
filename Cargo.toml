[package]
name = "rusty-fuzz"
version = "0.1.0"
edition = "2021"

[dependencies]
# EVM & Blockchain - compatible with Rust 1.63
revm = { version = "14", default-features = false, features = ["std", "serde", "memory_limit"] }
revm-primitives = "3"
alloy-primitives = "0.4"
alloy-json-abi = "0.4"
alloy-dyn-abi = "0.4"

# Fuzzing - older version compatible with Rust 1.63
libafl = "0.9"
libafl_bolts = "0.9"

# Async & Networking
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization & Data
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
toml = "0.7"
hex = "0.4"
bitvec = "1.0"

# Concurrency & Utils
dashmap = "5.5"
parking_lot = "0.12"
chrono = { version = "0.4", features = ["serde"] }
url = "2.4"
anyhow = "1.0"
rand = "0.8"

# Optional
z3 = { version = "0.11", optional = true }
reqwest = { version = "0.11", features = ["json"], optional = true }

[features]
default = []
z3 = ["dep:z3"]
llm = ["dep:reqwest"]
