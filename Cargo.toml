[package]
name = "rusty-fuzz"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core Fuzzing Engine
libafl = "0.15.4"
libafl_bolts = "0.15.4"

# EVM & Ethereum Tooling
revm = { version = "14.0", features = ["std", "serde", "alloydb"] }
alloy = { version = "1.5.7", features = ["full", "node-bindings", "rpc-types-debug"] }
alloy-dyn-abi = "0.8"
alloy-json-abi = "0.8"

# Async & Networking
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
async-trait = "0.1"

# Serialization & Data
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
postcard = { version = "1.0", features = ["use-std"] }
toml = "0.8"
hex = "0.4"

# Utilities
clap = { version = "4.6", features = ["derive"] }
bitvec = "1.0"
dashmap = "6.0"
parking_lot = "0.12"
chrono = "0.4"
url = "2.5"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rand = "0.8"

# Optional Features
z3 = { version = "0.12", optional = true }

[features]
default = []
z3 = ["dep:z3"]
llm = []
