[package]
name = "rusty-fuzz"
version = "0.1.0"
edition = "2021"

[dependencies]
alloy = { version = "1", features = ["full"] }
alloy-dyn-abi = "1"
alloy-json-abi = "1"

revm = { version = "25", default-features = false, features = ["std", "serde", "memory_limit", "secp256k1", "portable", "alloydb"] }

libafl = "0.13.2"
libafl_bolts = "0.13.2"

tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
clap = { version = "4.6", features = ["derive"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3.3"
postcard = { version = "1.1", features = ["use-std"] }
toml = "0.8"

anyhow = "1.0"
rand = "0.8"
bitvec = "1.0"
dashmap = "6.0"
parking_lot = "0.12"
chrono = { version = "0.4", features = ["serde"] }
url = "2.5"
hex = "0.4"

z3 = { version = "0.12", optional = true }
reqwest = { version = "0.12", features = ["json"], optional = true }

[features]
default = []
z3 = ["dep:z3"]
llm = ["dep:reqwest"]
